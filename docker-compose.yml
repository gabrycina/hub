services:
  hub:
    build: .
    network_mode: host
    environment:
      HUB_HOST: 127.0.0.1
      HUB_PORT: 8080
      HUB_DATA_DIR: /data
      HUB_OWNER: ${HUB_OWNER:-local@dev}
      HUB_API_TOKEN: ${HUB_API_TOKEN:-changeme}
      HUB_PUBLIC_URL: ${HUB_PUBLIC_URL:-http://127.0.0.1:8080}
    volumes:
      - hub-data:/data
    restart: unless-stopped

volumes:
  hub-data: