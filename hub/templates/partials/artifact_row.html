<div id="artifact-{{ artifact.id }}" class="file-row" data-url="{{ artifact.url }}" data-title="{{ artifact.title }}">
  <a href="/a/{{ artifact.id }}" class="file-link col-name">
    <svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" fill="currentColor"/></svg>
    <span class="file-title">{{ artifact.title }}</span>
  </a>
  <div class="file-meta col-meta">
    {% if can_manage %}
    <button
      type="button"
      class="badge badge-{{ artifact.visibility.value }} badge-toggle"
      hx-post="/a/{{ artifact.id }}/visibility?visibility={% if artifact.visibility.value == 'private' %}shareable{% else %}private{% endif %}"
      hx-target="#artifact-{{ artifact.id }}"
      hx-swap="outerHTML"
      title="{% if artifact.visibility.value == 'private' %}Make shareable{% else %}Make private{% endif %}"
    >{{ artifact.visibility.value }}</button>
    {% else %}
    <span class="badge badge-{{ artifact.visibility.value }}">{{ artifact.visibility.value }}</span>
    {% endif %}
    {% if artifact.tags %}
    <span class="file-tags">{{ artifact.tags | join(', ') }}</span>
    {% endif %}
  </div>
  <time class="col-date" datetime="{{ artifact.updated_at.isoformat() }}">{{ artifact.updated_at.strftime('%b %d, %Y') }}</time>
  <span class="col-size">{{ artifact.size_bytes | format_bytes }}</span>
  <div class="file-menu col-actions">
    <details class="row-menu">
      <summary class="row-menu-btn" aria-label="Actions for {{ artifact.title }}">⋯</summary>
      <div class="row-menu-panel">
        <button type="button" class="row-menu-item" onclick="shareReport(this)">Share</button>
        <a class="row-menu-item" href="/a/{{ artifact.id }}/download" download>Download</a>
        {% if can_manage %}
        <button
          type="button"
          class="row-menu-item row-menu-item-danger"
          hx-delete="/a/{{ artifact.id }}"
          hx-target="#artifact-{{ artifact.id }}"
          hx-swap="outerHTML swap:0.2s"
          hx-confirm="Delete this report?"
        >Delete</button>
        {% endif %}
      </div>
    </details>
  </div>
</div>
