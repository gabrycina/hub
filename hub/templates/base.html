<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ settings.brand_name if settings else "Hub" }}{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block header %}
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Hub home">
        <img src="/static/logo.png" alt="" class="brand-logo" width="64" height="64">
      </a>
      <div class="header-meta">
        {% if auth %}
        <span class="user-badge">{{ auth.user }}</span>
        {% endif %}
        <a href="https://github.com/gabrycina/hub" class="header-link">Docs</a>
      </div>
    </div>
  </header>
  {% endblock %}
  <main class="{% block main_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  {% block page_overlay %}{% endblock %}
</body>
</html>
