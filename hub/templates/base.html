<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hub{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block header %}
  <header class="site-header liquid-glass">
    <div class="container header-inner">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.9"/><rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.55"/><rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.55"/><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.35"/></svg>
        </span>
        Hub
      </a>
      <div class="header-meta">
        {% if auth %}
        <span class="user-badge">{{ auth.user }}</span>
        {% endif %}
        <a href="https://github.com/gabrycina/hub" class="header-link">Docs</a>
      </div>
    </div>
  </header>
  {% endblock %}
  <main class="{% block main_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
